name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Docker 이미지 빌드 & push (GHCR) ──────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/backend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.repo }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo }}/frontend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.repo }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GitHub Release 생성 ────────────────────────────────────────────────
      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## 변경 사항

            ${{ steps.release_notes.outputs.notes }}

            ## Docker 이미지

            ```bash
            # 백엔드
            docker pull ghcr.io/${{ steps.meta.outputs.repo }}/backend:${{ steps.meta.outputs.version }}

            # 프론트엔드
            docker pull ghcr.io/${{ steps.meta.outputs.repo }}/frontend:${{ steps.meta.outputs.version }}
            ```

            ## 배포

            ```bash
            # docker-compose로 실행
            docker compose pull
            docker compose up -d
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
